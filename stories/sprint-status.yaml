# Sprint Status Tracker
# ---------------------
# 用途：bmad-create-story / bmad-sprint-status / bmad-dev-story 等 skill 读取本文件，
#       自动发现下一个应处理的 story。
# 状态定义（STATUS DEFINITIONS）：
#   backlog        — 已规划但未进入开发流；bmad-create-story 默认从这里挑下一条
#   ready-for-dev  — 单 story 规格已生成并 ready；等待 dev 执行
#   in-progress    — dev 正在实现
#   code-review    — 代码已写完，等待 code-review
#   done           — 已合入并通过验收
# Epic 级 key 仅用状态字段表达 epic 整体进度（backlog / in-progress / done）。
#
# 排序规则：按 epic 升序、story 升序；本文件顺序即 create-story 自动发现顺序。

